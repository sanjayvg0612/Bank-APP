<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <div class="auth-card">
            <h1>Log in</h1>
            <div id="error" class="flash flash-error" style="display:none"></div>
            <form id="loginForm">
                <label for="username">Username</label>
                <input type="text" id="username" required autofocus>

                <label for="password">Password</label>
                <input type="password" id="password" required>

                <button type="submit" class="btn-primary">Log in</button>
            </form>
            <p class="auth-alt">New here? <a href="register.html">Open an account</a></p>
            <p class="auth-hint">Demo login: <code>demo</code> / <code>demo1234</code></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
