<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SecureBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="container">
        <h1 id="greeting">Welcome</h1>

        <div class="summary-card">
            <span class="summary-label">Total balance across accounts</span>
            <span class="summary-value" id="totalBalance">Loading...</span>
        </div>

        <h2>Your accounts</h2>
        <div class="account-grid" id="accountGrid"></div>

        <div class="quick-actions">
            <a href="transfer.html" class="btn-secondary">Transfer funds</a>
            <a href="billpay.html" class="btn-secondary">Pay a bill</a>
        </div>

        <h2>Recent activity</h2>
        <table class="txn-table">
            <thead>
                <tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr>
            </thead>
            <tbody id="recentBody"></tbody>
        </table>
    </main>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
