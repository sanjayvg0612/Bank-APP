<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statement - SecureBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="container">
        <a class="back-link" id="backLink" href="dashboard.html">&larr; Back to account</a>
        <h1 id="statementTitle">Statement</h1>

        <div class="filter-row">
            <label for="daysSelect">Show last</label>
            <select id="daysSelect">
                <option value="7">7 days</option>
                <option value="30">30 days</option>
                <option value="90">90 days</option>
                <option value="365">1 year</option>
            </select>
            <a class="btn-secondary" id="csvLink" href="#">Download CSV</a>
        </div>

        <table class="txn-table">
            <thead>
                <tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Balance</th></tr>
            </thead>
            <tbody id="stmtBody"></tbody>
        </table>
    </main>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/statement.js"></script>
</body>
</html>
