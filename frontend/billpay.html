<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay bills - SecureBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="container">
        <div class="form-card">
            <h1>Pay a bill</h1>
            <div id="error" class="flash flash-error" style="display:none"></div>
            <form id="billpayForm">
                <label for="accountSelect">Pay from</label>
                <select id="accountSelect" required></select>

                <label for="billerSelect">Biller</label>
                <select id="billerSelect" required></select>

                <label for="amount">Amount (Rs.)</label>
                <input type="number" id="amount" step="0.01" min="0.01" required>

                <button type="submit" class="btn-primary">Pay bill</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/billpay.js"></script>
</body>
</html>
