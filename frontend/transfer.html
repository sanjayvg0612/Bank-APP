<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer funds - SecureBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="container">
        <div class="form-card">
            <h1>Transfer funds</h1>
            <div id="error" class="flash flash-error" style="display:none"></div>
            <form id="transferForm">
                <label for="fromAccount">From account</label>
                <select id="fromAccount" required></select>

                <label for="beneficiarySelect">Choose beneficiary (or enter manually)</label>
                <select id="beneficiarySelect">
                    <option value="">-- Select beneficiary --</option>
                </select>

                <label for="toAccount">Beneficiary account number</label>
                <input type="text" id="toAccount" required>

                <button type="button" id="showQrBtn" class="btn-secondary">Show my receive QR</button>

                <label for="amount">Amount (Rs.)</label>
                <input type="number" id="amount" step="0.01" min="0.01" required>

                <label for="description">Remarks (optional)</label>
                <input type="text" id="description" placeholder="e.g. Rent payment">

                <button type="submit" class="btn-primary">Transfer</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="js/scan.js"></script>
    <script src="js/transfer.js"></script>
</body>
</html>
