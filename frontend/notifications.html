<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Notifications - SecureBank</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <h2>Notifications</h2>
    <div id="notList"></div>
  </main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
(async () => {
  const user = await renderNav(); if (!user) return;
  const list = document.getElementById('notList');
  function render(items) {
    list.innerHTML = items.map(i => `<div class="notification">${i.message} <small>${new Date(i.timestamp).toLocaleString()}</small></div>`).join('');
  }
  try {
    const res = await apiRequest('/notifications'); render(res.notifications);
  } catch (e) { list.innerHTML = '<p>Failed to load.</p>'; }

  // SSE stream
  const es = new EventSource('/api/notifications/stream');
  es.onmessage = (ev) => {
    try {
      const obj = JSON.parse(ev.data.replace(/'/g, '"'));
      // reload list (simple approach)
      apiRequest('/notifications').then(r => render(r.notifications));
    } catch (e) {}
  }
})();
</script>
</body>
</html>
