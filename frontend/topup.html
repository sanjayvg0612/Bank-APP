<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Top up - SecureBank</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <h2>Add money</h2>
    <div id="topupError" class="error" style="display:none"></div>
    <form id="topupForm">
      <label>Amount (Rs.)</label>
      <input id="topupAmount" type="number" step="0.01" min="1" required />
      <button type="submit">Top up (sandbox)</button>
    </form>
    <div id="topupResult"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
  (async () => {
    const user = await renderNav(); if (!user) return;
    document.getElementById('topupForm').addEventListener('submit', async (e) => {
      e.preventDefault(); document.getElementById('topupError').style.display='none';
      const amt = parseFloat(document.getElementById('topupAmount').value);
      try {
        const res = await apiRequest('/topup', { method: 'POST', body: JSON.stringify({ amount: amt }) });
        // For demo, immediately confirm topup
        await apiRequest('/topup/confirm', { method: 'POST', body: JSON.stringify({ id: res.id, amount: amt }) });
        document.getElementById('topupResult').textContent = 'Top-up successful';
      } catch (err) {
        document.getElementById('topupError').textContent = err.message; document.getElementById('topupError').style.display='block';
      }
    });
  })();
  </script>
</body>
</html>
